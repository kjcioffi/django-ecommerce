name: Lint Python

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install ruff
      run: |
        pip install ruff

    - name: Run ruff
      run: |
        # Exclude migrations, manage.py, and other common Django files
        ruff check . --exclude '**/migrations/*,manage.py' --fix